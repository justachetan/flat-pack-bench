    - Read the question and all answer choices.
    
    - Determine the correct option.

    - Please explain your answer step-by-step.
    
    - Reply **only** with a JSON object containing a two keys - 
        
        1) "answer", whose value is the letter of your chosen option (for example "A", "B", "C", etc.).

        2) "explanation", whose value is a step-by-step explanation of your answer.



    **No additional text, explanations, or formatting -- just the JSON string.**
