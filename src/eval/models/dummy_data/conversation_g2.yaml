- content: "You are a furniture-assembly expert. You are given:\n\n1. A video of a\
    \ furniture assembly in progress.\n2. Two still images, Image A and Image B showing\
    \ different steps  in the assembly process, with certain parts shaded and labeled.\n\
    3. A multiple-choice question (with its list of answer options)  that refers to\
    \ both the video and the image.\n\nYour responsibilities:\n\n- Watch and interpret\
    \ the assembly steps in the video.\n- Examine the labeled image frames to understand\
    \ part relationships.  \n- Read the question and all answer choices.\n- Determine\
    \ the correct option.\n- Reply **only** with a JSON object containing a single\
    \ key, \"answer\", whose value is the letter of your chosen option (for example\
    \ \"A\", \"B\", \"C\", etc.).\n\n**No additional text, explanations, or formatting\u2014\
    just the JSON string.**"
  tag: task_instruction
  type: text
- content: 'Now answer the following question:'
  tag: question_mark
  type: text
- content: 'Identify the correct set of matches from Image A to Image B.

    Options:

    A. Part 7 in Image A matches Part 7 in Image B, Part 8 in Image A matches Part
    8 in Image B, Part 6 in Image A matches Part 6 in Image B,  and Part 9 in Image
    A matches Part 9 in Image B

    B. Part 7 in Image A matches Part 7 in Image B, Part 8 in Image A matches Part
    6 in Image B, Part 6 in Image A matches Part 8 in Image B,  and Part 9 in Image
    A matches Part 9 in Image B

    C. Part 7 in Image A matches Part 8 in Image B, Part 8 in Image A matches Part
    7 in Image B, Part 6 in Image A matches Part 9 in Image B,  and Part 9 in Image
    A matches Part 6 in Image B

    D. Part 7 in Image A matches Part 7 in Image B, Part 8 in Image A matches Part
    8 in Image B, Part 6 in Image A matches Part 9 in Image B,  and Part 9 in Image
    A matches Part 6 in Image B

    '
  tag: question
  type: text
